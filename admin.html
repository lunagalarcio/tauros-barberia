<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tauro's Barbería | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin">
  <!-- Login Screen -->
  <div id="login-screen" class="admin-login">
    <div class="login-box">
      <div class="logo">TAURO'S</div>
      <p style="color: var(--text-muted); margin-bottom: 25px;">Panel de Administración</p>
      <form id="login-form">
        <input type="password" id="admin-password" placeholder="Contraseña" required>
        <button type="submit">Iniciar sesión</button>
      </form>
      <p id="login-error" class="login-error">Contraseña incorrecta</p>
      <a href="index.html" style="display: block; margin-top: 20px; color: var(--text-muted); font-size: 0.9rem;">← Volver al inicio</a>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="admin-panel">
    <header class="admin-header">
      <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo">TAURO'S <span style="font-size: 0.9rem; color: var(--text-muted);">Admin</span></div>
        <button id="logout-btn" class="btn-logout">Cerrar sesión</button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="admin-tabs">
      <button class="admin-tab active" data-tab="barberos" onclick="mostrarTab('barberos')">Barberos</button>
      <button class="admin-tab" data-tab="horarios" onclick="mostrarTab('horarios')">Horarios</button>
      <button class="admin-tab" data-tab="citas" onclick="mostrarTab('citas')">Citas</button>
    </nav>

    <!-- Tab Content -->
    <main class="admin-content">
      <!-- Barberos Tab -->
      <section id="tab-barberos" class="tab-section active">
        <div id="barberos-list"></div>
      </section>

      <!-- Horarios Tab -->
      <section id="tab-horarios" class="tab-section">
        <div style="max-width: 600px; margin-bottom: 30px;">
          <label style="display: block; margin-bottom: 10px; font-weight: 500; color: var(--text);">Seleccionar Barbero</label>
          <select id="barbero-select" style="width: 100%; padding: 12px; border: 1px solid rgba(239, 184, 16, 0.2); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text);">
            <option value="">Selecciona un barbero</option>
          </select>
        </div>
        <div id="horarios-content">
          <p style="color: var(--text-muted); text-align: center;">Selecciona un barbero para ver sus horarios</p>
        </div>
      </section>

      <!-- Citas Tab -->
      <section id="tab-citas" class="tab-section">
        <div id="citas-list"></div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h3 id="modal-title">Modal</h3>
      <form id="modal-form" onsubmit="return false;"></form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
